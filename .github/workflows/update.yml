name: Sync DNS Rules to Cloudflare Worker

on:
  # ── 定时触发：每天两次（UTC 02:00 / 14:00，对应北京时间 10:00 / 22:00）──
  schedule:
    - cron: "0 2 * * *"
    - cron: "0 14 * * *"

  # ── 每次 push 到 main 分支时触发 ──────────────────────────────────
  push:
    branches:
      - main
    paths:                        # 仅规则文件有变动时才触发，节省 Actions 用量
      - "Rules/**"

  # ── 手动触发 ──────────────────────────────────────────────────────
  workflow_dispatch:
    inputs:
      reason:
        description: "手动触发原因（可选）"
        required: false
        default: "手动同步"

jobs:
  upload:
    name: Upload Rules to Cloudflare Worker
    runs-on: ubuntu-latest

    steps:
      - name: 📥 检出仓库
        uses: actions/checkout@v4

      - name: 🐍 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 🚀 执行上传脚本
        env:
          WORKER_DOMAIN: ${{ secrets.WORKER_DOMAIN }}
          UPLOAD_TOKEN:  ${{ secrets.UPLOAD_TOKEN }}
        run: python Sync/sync.py   # 假设脚本放在仓库 Scripts/ 目录下
