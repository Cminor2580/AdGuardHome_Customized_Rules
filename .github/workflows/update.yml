name: Sync Rules

on:
  schedule:
    - cron: "0 2 * * *"    # UTC 02:00 = 北京时间 10:00
    - cron: "0 14 * * *"   # UTC 14:00 = 北京时间 22:00

  push:
    branches:
      - main
    paths:
      # 仅当这 3 个文件本身有改动时才触发，新增/重命名/其他文件不受影响
      - "Rules/Android/Android_DNS_Rules.txt"
      - "Rules/iOS/iOS_DNS_Rules.txt"
      - "Rules/Universal/Universal_DNS_Rules.txt"

  workflow_dispatch:
    inputs:
      reason:
        description: "触发原因（可选）"
        required: false
        default: "手动同步"

jobs:
  sync:
    name: Sync
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run
        env:
          SYNC_HOST:  ${{ secrets.SYNC_HOST }}
          SYNC_TOKEN: ${{ secrets.SYNC_TOKEN }}
        run: python Sync/sync.py
